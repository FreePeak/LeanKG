<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Triangle graph: 3 nodes, 3 edges = minimal connected graph (knowledge graph) -->
  <g stroke="#334155" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="32" y1="12" x2="52" y2="52"/>
    <line x1="52" y1="52" x2="12" y2="52"/>
    <line x1="12" y1="52" x2="32" y2="12"/>
  </g>
  <g fill="#334155">
    <circle cx="32" cy="12" r="4"/>
    <circle cx="52" cy="52" r="4"/>
    <circle cx="12" cy="52" r="4"/>
  </g>
</svg>
